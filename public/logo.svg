<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>BookHive Logo</title>
  <desc>Modern minimalist logo combining a book and hexagon for BookHive digital library platform</desc>

  <!-- Transparent background -->

  <!-- Outer hex (dark shadow layer) -->
  <polygon points="250,86 326,130 326,218 250,262 174,218 174,130" fill="#111827"/>

  <!-- Main hex (amber) -->
  <polygon points="250,90 324,134 324,222 250,266 176,222 176,134" fill="#F59E0B"/>

  <!-- Inner hex (dark) -->
  <polygon points="250,106 312,142 312,214 250,250 188,214 188,142" fill="#111827"/>

  <!-- Left book page -->
  <rect x="204" y="146" width="44" height="64" rx="3" fill="#F59E0B"/>
  <!-- Right book page -->
  <rect x="252" y="146" width="44" height="64" rx="3" fill="#FBBF24"/>

  <!-- Spine -->
  <line x1="250" y1="146" x2="250" y2="210" stroke="#111827" stroke-width="3" stroke-linecap="round"/>

  <!-- Left page lines -->
  <line x1="212" y1="162" x2="240" y2="162" stroke="#111827" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  <line x1="212" y1="172" x2="240" y2="172" stroke="#111827" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  <line x1="212" y1="182" x2="240" y2="182" stroke="#111827" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  <line x1="212" y1="192" x2="240" y2="192" stroke="#111827" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>

  <!-- Right page lines -->
  <line x1="260" y1="162" x2="288" y2="162" stroke="#111827" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="260" y1="172" x2="288" y2="172" stroke="#111827" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="260" y1="182" x2="288" y2="182" stroke="#111827" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="260" y1="192" x2="288" y2="192" stroke="#111827" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>

  <!-- Open-book arc -->
  <path d="M204,210 Q227,220 250,210 Q273,220 296,210" fill="none" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Corner hive dots -->
  <circle cx="250" cy="90"  r="4" fill="#FDE68A"/>
  <circle cx="324" cy="134" r="4" fill="#FDE68A"/>
  <circle cx="324" cy="222" r="4" fill="#FDE68A"/>
  <circle cx="250" cy="266" r="4" fill="#FDE68A"/>
  <circle cx="176" cy="222" r="4" fill="#FDE68A"/>
  <circle cx="176" cy="134" r="4" fill="#FDE68A"/>

  <!-- Wordmark -->
  <text x="163" y="322" font-family="'Inter', Arial, sans-serif" font-size="44" font-weight="700" fill="#111827" letter-spacing="-1">Book</text>
  <text x="281" y="322" font-family="'Inter', Arial, sans-serif" font-size="44" font-weight="700" fill="#F59E0B" letter-spacing="-1">Hive</text>

  <!-- Tagline -->
  <text x="250" y="356" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="400" fill="#6B7280" text-anchor="middle" letter-spacing="3">YOUR DIGITAL LIBRARY</text>

  <!-- Subtle divider -->
  <line x1="204" y1="284" x2="296" y2="284" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

</svg>
